<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dtool desktop</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(140deg, #eef7ff 0%, #f6fbf5 50%, #ffffff 100%);
      color: #1f2937;
    }
    .box {
      min-width: 360px;
      padding: 24px 28px;
      border-radius: 14px;
      border: 1px solid #dbeafe;
      background: #ffffffd9;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .title { font-size: 20px; margin-bottom: 12px; }
    .desc { color: #4b5563; font-size: 14px; }
  </style>
</head>
<body>
<div class="box">
  <div class="title">dtool 桌面版启动中</div>
  <div class="desc">正在拉起本地服务，请稍候...</div>
</div>
</body>
</html>
