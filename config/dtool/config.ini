# nginx 配置
[run]
ports=17170,17171

# 目录配置
[path]
# 以下三个不设置具体目录那么在~/.dtool/目录
# 浏览器驱动目录
webkit_driver_path=
# 浏览器缓存及cookie目录
webkit_data_path=
# 浏览器下载目录
webkit_download_path=

[base]
# 主数据库，如果未配置，则默认使用~/.dtool目录
dbPath=
# 如果未配置，则自动使用dtool.db，不存在时创建
dbFileName=
# 存放db的目录是否为git仓库，如果为true，那么将在启动时pull，退出时push
dbIsGitRepo=false

# 知识片段，如果未配置，则默认使用~/.dtool目录
memoryDbPath=
# 如果未配置，则自动使用memory.db，不存在时创建
memoryDbFileName=memory.db
# 存放db的目录是否为git仓库，如果为true，那么将在启动时pull，退出时push，知识片段变更后自动push
memoryDbIsGitRepo=false
