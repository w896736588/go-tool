# nginx 配置
[run]
api_port = 17170
sse_port = 17172,17173,17174,17175

[base]
# 主数据库，如果未配置，则默认使用~/.dtool目录
dbPath                       = C:\work\self\dev_tool_db\zhima
# 如果未配置，则自动使用dtool.db，不存在时创建
dbFileName                   = frog.db
# 存放db的目录是否为git仓库，如果为true，那么将在启动时pull，退出时push
dbIsGitRepo                  = true
# 日志库目录，如果未配置，则默认使用与主库相同目录
logDbPath                    =
# 知识片段，如果未配置，则默认使用~/.dtool目录
memoryDbPath                 = C:\work\self\dev_tool_db\memory
# 知识片段固定写入本地 Markdown 目录 ~/.dtool/memory；开启后按 Git 仓库处理
memoryDbIsGitRepo            = true
# 本地 Markdown 知识片段变更后，延迟多少分钟自动 git commit + push；0 表示关闭自动 push
memoryDbAutoPushDelayMinutes = 20
dbAutoPushDelayMinutes       = 20

[smart_link]
run_mode       = server
# 要求的客户端版本号
client_version = 2.0.0
# 源代码目录，用于客户端动态编译下载。打包部署时需显式指定源代码路径。
source_path    =

[safe]
password =