# nginx 配置
[run]
ports = 17170

[base]
# 主数据库，如果未配置，则默认使用~/.dtool目录
dbPath=
# 如果未配置，则自动使用dtool.db，不存在时创建
dbFileName=
# 存放db的目录是否为git仓库，如果为true，那么将在启动时pull，退出时push
dbIsGitRepo=false
# 日志库目录，如果未配置，则默认使用与主库相同目录
logDbPath=

# 知识片段，如果未配置，则默认使用~/.dtool目录
memoryDbPath=
# 存放知识片段目录是否为git仓库，如果为true，那么将在启动时pull，退出时push，知识片段变更后自动push
memoryDbIsGitRepo=false
# 知识片段写入本地 markdown 后，延迟多少分钟自动 git commit + push；0 表示关闭自动 push
memoryDbAutoPushDelayMinutes=1

# 自定义网页配置
[smart_link]
# 运行模式：server=服务端执行，local_client=本地客户端执行
run_mode=server
# 要求的客户端版本号
client_version=1.0.0
download_windows_url=https://your-domain/path/dtool-agent.exe
download_macos_url=https://your-domain/path/dtool-agent.dmg
