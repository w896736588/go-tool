version: "3"

tasks:
  run-server-company:
    desc: Run web backend with company config
    cmds:
      - go run ./cmd/dtool/main.go --ConfigFile=company

  run-web-dev:
    desc: Run frontend dev server
    dir: web
    cmds:
      - npm install
      - npm run dev

  run-wails:
    desc: Run desktop app locally
    cmds:
      - go run -tags production ./cmd/dtool_wails --ConfigFile=company

  run-dev-company:
    desc: Run frontend and backend for company environment
    deps:
      - run-web-dev
      - run-server-company

  build-frontend:
    desc: Build frontend dist assets
    dir: web
    cmds:
      - npm install
      - npm run prod

  build-web-windows:
    desc: Build Windows web backend
    cmds:
      - go build -ldflags "-s -w" -o build/dtool.exe ./cmd/dtool

  build-web-linux:
    desc: Build Linux web backend
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags "-s -w" -o build/dtool ./cmd/dtool

  build-web-macos:
    desc: Build macOS web backend
    cmds:
      - go build -ldflags "-s -w" -o build/dtool ./cmd/dtool

  build-wails-windows:
    desc: Build Windows desktop app
    cmds:
      - go build -tags production -ldflags "-s -w -H=windowsgui" -o build/dtool_wails.exe ./cmd/dtool_wails

  build-wails-linux:
    desc: Build Linux desktop app
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: "0"
    cmds:
      - go build -tags production -ldflags "-s -w" -o build/dtool_wails ./cmd/dtool_wails

  build-wails-macos:
    desc: Build macOS desktop app
    cmds:
      - go build -tags production -ldflags "-s -w" -o build/dtool_wails ./cmd/dtool_wails

  clean-build:
    desc: Recreate the build directory
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8; if (Test-Path './build') { Remove-Item './build' -Recurse -Force }; New-Item -ItemType Directory -Path './build' | Out-Null"

  package-windows:
    desc: Build Windows release package
    platforms: [windows]
    deps:
      - build-frontend
      - build-web-windows
      - build-wails-windows
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ./script/package_windows.ps1

  package-linux:
    desc: Build Linux release package
    cmds:
      - bash ./script/package_unix.sh linux

  package-macos:
    desc: Build macOS release package
    cmds:
      - bash ./script/package_unix.sh macos
